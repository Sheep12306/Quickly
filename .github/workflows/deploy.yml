name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build
        working-directory: front
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ECS_SSH_KEY }}

      - name: Rsync deploy files
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts
          rsync -avz --delete \
            front/dist/ \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/quickly/front/dist/
          rsync -avz \
            front/package.json front/package-lock.json \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/quickly/front/

      - name: Install deps & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/quickly/front
            npm ci --omit=dev
            pm2 restart quickly 2>/dev/null || PORT=3002 pm2 start dist/server.cjs --name quickly
            pm2 save
