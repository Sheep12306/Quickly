name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build
        working-directory: front
        run: npm run build

      - name: Package & deploy via SSH pipe
        run: |
          cd front
          tar czf /tmp/deploy.tar.gz dist package.json package-lock.json
          ssh -o StrictHostKeyChecking=no -p 22 \
            -i <(printf '%s' "${{ secrets.ECS_SSH_KEY }}") \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            'mkdir -p /opt/quickly/front && cd /opt/quickly/front && tar xzf - && npm ci --omit=dev 2>/dev/null || npm install --omit=dev && (pm2 restart quickly 2>/dev/null || PORT=3002 pm2 start dist/server.cjs --name quickly) && pm2 save' \
            < /tmp/deploy.tar.gz
