name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps & build
        working-directory: front
        run: |
          npm ci
          npm run build
          # Bundle package files into dist/ so server deps stay in sync
          cp package.json dist/
          cp package-lock.json dist/

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          source: front/dist
          target: /opt/quickly/front
          strip_components: 1
          overwrite: true

      - name: Install & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/quickly/front/dist
            npm ci --omit=dev 2>/dev/null || npm install --omit=dev
            pm2 restart quickly 2>/dev/null || PORT=3002 pm2 start server.cjs --name quickly
            pm2 save
