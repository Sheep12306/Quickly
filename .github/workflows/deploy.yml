name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build
        working-directory: front
        run: npm run build

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz front/dist/ ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/quickly/front/dist/
          rsync -avz front/package.json front/package-lock.json ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/quickly/front/

      - name: Restart service
        run: |
          ssh ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} "
            cd /opt/quickly/front
            npm ci --omit=dev 2>/dev/null || npm install --omit=dev
            pm2 restart quickly 2>/dev/null || PORT=3002 pm2 start dist/server.cjs --name quickly
            pm2 save
          "
