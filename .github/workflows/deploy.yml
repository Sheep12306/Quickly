name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build
        working-directory: front
        run: npm run build

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Validate key starts correctly
          head -1 ~/.ssh/id_rsa
          ssh-keyscan -H "${ECS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH config OK"

      - name: Deploy via rsync
        env:
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          set -e
          rsync -avz front/dist/ ${ECS_USER}@${ECS_HOST}:/opt/quickly/front/dist/
          rsync -avz front/package.json front/package-lock.json ${ECS_USER}@${ECS_HOST}:/opt/quickly/front/

      - name: Restart service
        env:
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
        run: |
          set -e
          ssh ${ECS_USER}@${ECS_HOST} "
            cd /opt/quickly/front
            npm ci --omit=dev 2>/dev/null || npm install --omit=dev
            pm2 restart quickly 2>/dev/null || PORT=3002 pm2 start dist/server.cjs --name quickly
            pm2 save
          "
